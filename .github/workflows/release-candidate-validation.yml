name: Release Candidate Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/release-candidate-validation.yml
      - script/validate_release_candidate.sh
  workflow_dispatch:
    inputs:
      release_tag:
        description: Draft or published GitHub Release tag
        required: true
        default: v0.1.0-rc.1
      asset_name:
        description: DMG asset name
        required: true
        default: Corewise-0.1.0-universal.dmg

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate DMG (${{ matrix.runner }})
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag || 'v0.1.0-rc.1' }}
      ASSET_NAME: ${{ inputs.asset_name || 'Corewise-0.1.0-universal.dmg' }}
    steps:
      - name: Check out validation script
        uses: actions/checkout@v4

      - name: Download release candidate
        run: |
          mkdir -p "$RUNNER_TEMP/corewise-release"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET_NAME" \
            --pattern "$ASSET_NAME.sha256" \
            --dir "$RUNNER_TEMP/corewise-release"

      - name: Validate signed and notarized DMG
        run: |
          expected_sha256="$(awk '{ print $1; exit }' "$RUNNER_TEMP/corewise-release/$ASSET_NAME.sha256")"
          script/validate_release_candidate.sh \
            "$RUNNER_TEMP/corewise-release/$ASSET_NAME" \
            "$expected_sha256"
