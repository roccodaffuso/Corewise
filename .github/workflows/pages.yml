# SPDX-License-Identifier: MPL-2.0
name: Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - site/**
      - docs/assets/corewise-app-icon.png
      - docs/assets/corewise-overview.png
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p _site/assets
          cp -R site/. _site/
          cp docs/assets/corewise-app-icon.png _site/assets/corewise-app-icon.png
          cp docs/assets/corewise-overview.png _site/assets/corewise-overview.png

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
