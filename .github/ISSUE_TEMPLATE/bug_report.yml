name: Bug report
description: Report a reproducible Corewise problem without sharing sensitive diagnostics.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove usernames, personal paths, prompts, process arguments, crash bodies, and private file contents before submitting.
  - type: input
    id: version
    attributes:
      label: Corewise version
      description: Find this under Settings → General → Build.
      placeholder: 0.1.0 (2)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac architecture
      placeholder: macOS 15.5, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: dropdown
    id: permission
    attributes:
      label: Was optional Full Disk Access enabled?
      options:
        - No
        - Yes
        - Not relevant
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal paths, prompts, process arguments, raw crash contents, credentials, and private file contents.
          required: true
        - label: This is not a security vulnerability; security reports use the private channel in SECURITY.md.
          required: true
